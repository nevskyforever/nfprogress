name: Build Windows EXE

on:
  push:
    branches:
      - main  # Укажи свою основную ветку (например, master или main)
  workflow_dispatch:  # Сохраняем возможность ручного запуска

jobs:
  build:
    runs-on: windows-latest
    # Условие: выполнять только если в коммите есть 'Обновление' ИЛИ запущено вручную
    if: contains(github.event.head_commit.message, 'Обновление') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements-build.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "nuitka[onefile]"
          pip install zstandard
          pip install PySide6
          pip install python-docx
          pip install striprtf

      - name: Cache Nuitka downloads (Dependency Walker и др.)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-cache-${{ runner.os }}

      - name: Get version from engine.py
        run: |
          $VERSION = python -c "import engine; print(engine.version)"
          echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Update release manifest
        run: |
          python scripts/update-release-manifest.py $env:APP_VERSION

      - name: Prepare Qt translations (ru/en only)
        run: |
          # QTranslator подгружает qt_ru.qm вместе со всеми его подкаталогами
          # (qtbase_ru.qm и т.д.) из той же папки, поэтому нужны все *_ru.qm/*_en.qm,
          # а не один произвольный файл - иначе перевод стандартных кнопок не сработает.
          $src = "${{ env.pythonLocation }}\Lib\site-packages\PySide6\translations"
          $dst = "$env:RUNNER_TEMP\translations"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Copy-Item "$src\*_ru.qm" $dst
          Copy-Item "$src\*_en.qm" $dst

      - name: Build EXE with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=attach `
            --lto=yes `
            --windows-icon-from-ico=icon.ico `
            --include-data-file=icon.ico=icon.ico `
            --include-data-dir="$env:RUNNER_TEMP/translations=PySide6/translations" `
            --output-dir=build `
            --output-filename=nfprogress.exe `
            --company-name="nfproject" `
            --product-name="nfprogress" `
            --file-version="${{ env.APP_VERSION }}" `
            --file-description="Трекер для писателей" `
            main_UI.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfprogress-windows-${{ env.APP_VERSION }}
          path: build/nfprogress.exe
          retention-days: 30

      - name: Upload EXE to hosting over SSH
        shell: pwsh
        env:
          SSH_UPLOAD_HOST: 77.222.62.219
          SSH_UPLOAD_USER: nevskyfore
          SSH_UPLOAD_DIR: nfproject/public_html/app
          SSH_UPLOAD_PORT: 22
          SSH_UPLOAD_PRIVATE_KEY: ${{ secrets.SSH_UPLOAD_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_HOST) -or
              [string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_USER) -or
              [string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_DIR) -or
              [string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_PRIVATE_KEY)) {
            Write-Host "SSH upload skipped: set SSH_UPLOAD_HOST, SSH_UPLOAD_USER, SSH_UPLOAD_DIR and SSH_UPLOAD_PRIVATE_KEY secrets to enable it."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_PORT)) {
            $env:SSH_UPLOAD_PORT = "22"
          }

          $artifact = "build\nfprogress.exe"
          if (-not (Test-Path $artifact)) {
            throw "Artifact not found: $artifact"
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "ssh_upload_key"
          $knownHostsPath = Join-Path $env:RUNNER_TEMP "known_hosts"
          $env:SSH_UPLOAD_PRIVATE_KEY | Set-Content -Path $keyPath -NoNewline
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):R" | Out-Null

          ssh-keyscan -p $env:SSH_UPLOAD_PORT $env:SSH_UPLOAD_HOST | Out-File -FilePath $knownHostsPath -Encoding ascii

          $target = "$($env:SSH_UPLOAD_USER)@$($env:SSH_UPLOAD_HOST)"
          $remoteFile = "nfprogress-windows-$($env:APP_VERSION).exe"
          Write-Host "Uploading $remoteFile to $($target):$($env:SSH_UPLOAD_DIR) ..."

          ssh -i $keyPath -p $env:SSH_UPLOAD_PORT -o UserKnownHostsFile=$knownHostsPath $target "mkdir -p '$($env:SSH_UPLOAD_DIR)'"
          scp -i $keyPath -P $env:SSH_UPLOAD_PORT -o UserKnownHostsFile=$knownHostsPath $artifact "${target}:$($env:SSH_UPLOAD_DIR)/$remoteFile"
          scp -i $keyPath -P $env:SSH_UPLOAD_PORT -o UserKnownHostsFile=$knownHostsPath update_manifest.json "${target}:$($env:SSH_UPLOAD_DIR)/update_manifest.json"
          scp -i $keyPath -P $env:SSH_UPLOAD_PORT -o UserKnownHostsFile=$knownHostsPath update_manifest.json "${target}:nfproject/public_html/update_manifest.json"
          Write-Host "SSH upload completed."
