name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (latest Nuitka)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade nuitka[onefile] pyside6

      - name: Install Dependency Walker manually
        run: |
          # Скачиваем архив
          curl -L -o depends.zip https://www.dependencywalker.com/depends22_x64.zip
          # Распаковываем
          Expand-Archive -Path depends.zip -DestinationPath depends_temp -Force
          # Ищем depends.exe в распакованных файлах
          $dependsExe = Get-ChildItem -Path depends_temp -Recurse -Filter "depends.exe" | Select-Object -First 1
          if ($dependsExe) {
              # Создаём папку для Nuitka
              New-Item -ItemType Directory -Force -Path "$env:LOCALAPPDATA\Nuitka" | Out-Null
              Copy-Item $dependsExe.FullName "$env:LOCALAPPDATA\Nuitka\depends.exe" -Force
              Write-Host "Dependency Walker installed to $env:LOCALAPPDATA\Nuitka\depends.exe"
          } else {
              Write-Host "depends.exe not found in archive"
              exit 1
          }
          # Проверяем, что файл действительно есть
          if (Test-Path "$env:LOCALAPPDATA\Nuitka\depends.exe") {
              Write-Host "Verification: depends.exe exists."
          } else {
              Write-Host "Verification failed."
              exit 1
          }

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --windows-console-mode=attach `
            --lto=yes `
            --msvc=14.3 `
            --windows-icon-from-ico=icon.ico `
            --include-data-file=icon.ico=icon.ico `
            --output-dir=build `
            --output-filename=nfprogress.exe `
            --company-name="nfproject" `
            --product-name="nfprogress" `
            --file-version="3.3.6" `
            --file-description="Writer Tracker" `
            main_UI.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfprogress
          path: build/nfprogress.exe