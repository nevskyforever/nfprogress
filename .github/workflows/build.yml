name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka[onefile] pyside6

      - name: Install Dependency Walker
        run: |
          # Скачиваем Dependency Walker (64-bit)
          curl -L -o depends.zip https://www.dependencywalker.com/depends22_x64.zip
          unzip depends.zip -d depends
          # Создаём папку, где Nuitka ожидает найти depends.exe
          mkdir -p $env:LOCALAPPDATA\Nuitka
          copy depends\depends22_x64\depends.exe $env:LOCALAPPDATA\Nuitka\depends.exe
          echo "Dependency Walker installed to $env:LOCALAPPDATA\Nuitka\depends.exe"

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --windows-console-mode=attach `
            --lto=yes `
            --msvc=14.3 `
            --windows-icon-from-ico=icon.ico `
            --include-data-file=icon.ico=icon.ico `
            --output-dir=build `
            --output-filename=nfprogress.exe `
            --company-name="nfproject" `
            --product-name="nfprogress" `
            --file-version="3.3.6" `
            --file-description="Writer Tracker" `
            main_UI.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfprogress
          path: build/nfprogress.exe