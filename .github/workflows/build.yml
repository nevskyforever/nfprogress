name: Build Windows EXE

on:
  workflow_dispatch:  # только ручной запуск через GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements-build.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "nuitka[onefile]"
          pip install zstandard
          pip install PySide6
          pip install python-docx
          pip install striprtf

      - name: Cache Nuitka downloads (Dependency Walker и др.)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-cache-${{ runner.os }}

      - name: Get version from engine.py
        run: |
          $VERSION = python -c "import engine; print(engine.version)"
          echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Build EXE with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=attach `
            --lto=yes `
            --windows-icon-from-ico=icon.ico `
            --include-data-file=icon.ico=icon.ico `
            --include-data-file="${{ env.pythonLocation }}/Lib/site-packages/PySide6/translations/qt_ru.qm=translations/qt_ru.qm" `
            --include-data-file="${{ env.pythonLocation }}/Lib/site-packages/PySide6/translations/qtbase_ru.qm=translations/qtbase_ru.qm" `
            --include-data-file="${{ env.pythonLocation }}/Lib/site-packages/PySide6/translations/qt_en.qm=translations/qt_en.qm" `
            --include-data-file="${{ env.pythonLocation }}/Lib/site-packages/PySide6/translations/qtbase_en.qm=translations/qtbase_en.qm" `
            --output-dir=build `
            --output-filename=nfprogress.exe `
            --company-name="nfproject" `
            --product-name="nfprogress" `
            --file-version="${{ env.APP_VERSION }}" `
            --file-description="Трекер для писателей" `
            main_UI.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfprogress-windows-${{ env.APP_VERSION }}
          path: build/nfprogress.exe
          retention-days: 30