name: Build Windows Executable

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Загружаем код
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pyside6

      # 4. Находим путь к PySide6
      - name: Find PySide6 path
        id: pyside6
        run: |
          $path = python -c "import PySide6, os; print(os.path.dirname(PySide6.__file__))"
          echo "path=$path" >> $env:GITHUB_OUTPUT
          echo "PySide6 path: $path"

      # 5. Собираем приложение (ваша команда, адаптированная)
      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyside6 `
            --windows-console-mode=attach `
            --lto=yes `
            --msvc=14.3 `
            --windows-icon-from-ico=icon.ico `
            --include-data-file=icon.ico=icon.ico `
            --include-data-dir="${{ steps.pyside6.outputs.path }}/translations=PySide6/translations" `
            --output-dir=build `
            --output-filename=nfprogress.exe `
            --company-name="nfproject" `
            --product-name="nfprogress" `
            --file-version="3.3.6" `
            --file-description="Трекер для писателей" `
            main_UI.py

      # 6. Сохраняем результат
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfprogress-windows
          path: build/nfprogress.exe