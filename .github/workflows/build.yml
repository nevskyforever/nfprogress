name: Build Windows standalone

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      telegram_message:
        description: 'Текст поста в Telegram. Если пусто, будет использован "Обновление <версия>".'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    if: contains(github.event.head_commit.message, 'Обновление') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka zstandard
          python -m pip install PySide6 python-docx striprtf

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress --yes
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to install Inno Setup: $LASTEXITCODE"
          }

      - name: Restore Nuitka cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-cache-${{ runner.os }}

      - name: Get version from engine.py
        shell: pwsh
        run: |
          $version = python -c "import engine; print(engine.version)"
          "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Extract release notes
        shell: pwsh
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          $message = ($env:COMMIT_MESSAGE -replace "`r`n", "`n")
          $lines = $message -split "`n"
          $headerIndex = -1
          for ($index = 0; $index -lt $lines.Count; $index++) {
            if ($lines[$index] -match '^[ \t]*Обновление[ \t]+[0-9]+\.[0-9]+(?:\.[0-9]+)?[ \t]*$') {
              $headerIndex = $index
              break
            }
          }
          $releaseNotes = ""
          if ($headerIndex -ge 0 -and $headerIndex + 1 -lt $lines.Count) {
            $releaseNotes = ($lines[($headerIndex + 1)..($lines.Count - 1)] -join "`n").Trim()
          }
          if ([string]::IsNullOrWhiteSpace($releaseNotes)) {
            $releaseNotes = "Исправлены ошибки и улучшена стабильность."
          }
          "RELEASE_NOTES<<EOF" >> $env:GITHUB_ENV
          $releaseNotes >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Prepare Qt translations
        shell: pwsh
        run: |
          $source = "${{ env.pythonLocation }}\Lib\site-packages\PySide6\translations"
          $destination = "$env:RUNNER_TEMP\translations"
          New-Item -ItemType Directory -Path $destination -Force | Out-Null
          Copy-Item "$source\*_ru.qm" $destination
          Copy-Item "$source\*_en.qm" $destination

      - name: Build standalone updater
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build\logs -Force | Out-Null
          python -m nuitka `
            --mode=standalone `
            --assume-yes-for-downloads `
            --windows-console-mode=force `
            --lto=yes `
            --windows-icon-from-ico=icon.ico `
            --output-dir=build\updater `
            --output-filename=nfprogress-updater.exe `
            --company-name="nfproject" `
            --product-name="nfprogress updater" `
            --file-version="${{ env.APP_VERSION }}" `
            --file-description="Безопасное обновление NFProgress" `
            --report=build\logs\updater-nuitka-report.xml `
            updater_main.py

      - name: Build standalone application
        shell: pwsh
        run: |
          python -m nuitka `
            --mode=standalone `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=disable `
            --lto=yes `
            --windows-icon-from-ico=icon.ico `
            --include-data-file=icon.ico=icon.ico `
            --include-data-file=Icon.svg=Icon.svg `
            --include-data-file=Icon-256.png=Icon-256.png `
            --include-data-dir="$env:RUNNER_TEMP/translations=PySide6/translations" `
            --output-dir=build\main `
            --output-filename=nfprogress.exe `
            --company-name="nfproject" `
            --product-name="nfprogress" `
            --file-version="${{ env.APP_VERSION }}" `
            --file-description="Трекер для писателей" `
            --report=build\logs\main-nuitka-report.xml `
            main_UI.py

      - name: Assemble standalone directory
        shell: pwsh
        run: |
          $mainExe = Get-ChildItem build\main -Recurse -Filter nfprogress.exe |
            Where-Object { $_.Directory.Name -like '*.dist' } |
            Select-Object -First 1
          $updaterExe = Get-ChildItem build\updater -Recurse -Filter nfprogress-updater.exe |
            Where-Object { $_.Directory.Name -like '*.dist' } |
            Select-Object -First 1
          if (-not $mainExe) { throw "Nuitka main standalone executable was not found." }
          if (-not $updaterExe) { throw "Nuitka updater standalone executable was not found." }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item $mainExe.Directory.FullName dist\nfprogress -Recurse
          New-Item -ItemType Directory -Path dist\nfprogress\updater-runtime -Force | Out-Null
          Copy-Item "$($updaterExe.Directory.FullName)\*" dist\nfprogress\updater-runtime -Recurse -Force
          Copy-Item $updaterExe.FullName dist\nfprogress\nfprogress-updater.exe -Force
          Copy-Item LICENSE dist\nfprogress\LICENSE.txt -Force
          Copy-Item SOURCE_CODE.txt dist\nfprogress\SOURCE_CODE.txt -Force
          Add-Content dist\nfprogress\SOURCE_CODE.txt `
            "`nРевизия сборки: $env:GITHUB_SHA"
          Add-Content dist\nfprogress\SOURCE_CODE.txt `
            "Архив исходного кода: https://github.com/nevskyforever/nfprogress_python/archive/$env:GITHUB_SHA.zip"

          if (-not (Test-Path dist\nfprogress\nfprogress.exe)) { throw "nfprogress.exe is missing." }
          if (-not (Test-Path dist\nfprogress\nfprogress-updater.exe)) { throw "nfprogress-updater.exe is missing." }
          if (-not (Test-Path dist\nfprogress\updater-runtime\nfprogress-updater.exe)) {
            throw "Independent updater runtime is missing."
          }
          if (-not (Test-Path dist\nfprogress\LICENSE.txt)) { throw "GPLv3 license is missing." }
          if (-not (Test-Path dist\nfprogress\SOURCE_CODE.txt)) { throw "Source code notice is missing." }

      - name: Run executable smoke tests
        shell: pwsh
        run: |
          $mainProcess = Start-Process `
            -FilePath dist\nfprogress\nfprogress.exe `
            -ArgumentList "--smoke-test" `
            -Wait `
            -PassThru
          if ($mainProcess.ExitCode -ne 0) {
            throw "nfprogress.exe smoke test failed: $($mainProcess.ExitCode)"
          }

          $rootUpdaterProcess = Start-Process `
            -FilePath dist\nfprogress\nfprogress-updater.exe `
            -ArgumentList "--help" `
            -Wait `
            -PassThru
          if ($rootUpdaterProcess.ExitCode -ne 0) {
            throw "root nfprogress-updater.exe smoke test failed: $($rootUpdaterProcess.ExitCode)"
          }

          $runtimeUpdaterProcess = Start-Process `
            -FilePath dist\nfprogress\updater-runtime\nfprogress-updater.exe `
            -ArgumentList "--help" `
            -Wait `
            -PassThru
          if ($runtimeUpdaterProcess.ExitCode -ne 0) {
            throw "nfprogress-updater.exe smoke test failed: $($runtimeUpdaterProcess.ExitCode)"
          }

      - name: Build and smoke-test Windows installer
        shell: pwsh
        run: |
          $isccCandidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw "Inno Setup compiler ISCC.exe was not found."
          }

          & $iscc "/DAppVersion=$env:APP_VERSION" installer.iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed: $LASTEXITCODE"
          }

          $installer = "dist\nfprogress-setup-$($env:APP_VERSION).exe"
          if (-not (Test-Path $installer)) {
            throw "Windows installer was not created: $installer"
          }

          $installDir = Join-Path $env:RUNNER_TEMP "nfprogress-installer-smoke"
          $installerArguments = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/SP-",
            "/DIR=`"$installDir`""
          )
          $installerProcess = Start-Process `
            -FilePath $installer `
            -ArgumentList $installerArguments `
            -Wait `
            -PassThru
          if ($installerProcess.ExitCode -ne 0) {
            throw "Windows installer smoke test failed: $($installerProcess.ExitCode)"
          }

          $installedExe = Join-Path $installDir "nfprogress.exe"
          if (-not (Test-Path $installedExe)) {
            throw "Installed nfprogress.exe was not found: $installedExe"
          }
          $installedProcess = Start-Process `
            -FilePath $installedExe `
            -ArgumentList "--smoke-test" `
            -Wait `
            -PassThru
          if ($installedProcess.ExitCode -ne 0) {
            throw "Installed nfprogress.exe smoke test failed: $($installedProcess.ExitCode)"
          }

      - name: Refresh current cross-platform manifest
        shell: pwsh
        run: |
          try {
            Invoke-WebRequest `
              -Uri "https://nfproject.ru/app/update_manifest.json" `
              -OutFile update_manifest.remote.json `
              -TimeoutSec 30
            $remoteManifest = Get-Content update_manifest.remote.json -Raw | ConvertFrom-Json
            if (-not $remoteManifest) { throw "Remote manifest is empty." }
            Move-Item update_manifest.remote.json update_manifest.json -Force
          } catch {
            Write-Warning "Current remote manifest is unavailable; repository manifest will be used: $_"
          }

      - name: Package and verify Windows ZIP
        shell: pwsh
        run: |
          $zipPath = "dist\nfprogress-windows-$($env:APP_VERSION).zip"
          $installer = "dist\nfprogress-setup-$($env:APP_VERSION).exe"
          Compress-Archive -Path dist\nfprogress -DestinationPath $zipPath -CompressionLevel Optimal
          python scripts\verify-windows-package.py `
            dist\nfprogress `
            $zipPath `
            dist\checksums-windows.txt `
            --installer $installer
          python scripts\update-release-manifest.py `
            $env:APP_VERSION `
            windows `
            $zipPath `
            $installer
          python scripts\create-legacy-manifest.py
          Get-AuthenticodeSignature dist\nfprogress\nfprogress.exe | Format-List Status, StatusMessage, Path |
            Out-File build\logs\authenticode-status.txt -Encoding utf8
          Get-AuthenticodeSignature dist\nfprogress\nfprogress-updater.exe | Format-List Status, StatusMessage, Path |
            Out-File build\logs\authenticode-status.txt -Encoding utf8 -Append
          Get-AuthenticodeSignature $installer | Format-List Status, StatusMessage, Path |
            Out-File build\logs\authenticode-status.txt -Encoding utf8 -Append
          $diagnosticsDir = "build\release-diagnostics"
          New-Item -ItemType Directory -Path $diagnosticsDir -Force | Out-Null
          Copy-Item build\logs "$diagnosticsDir\logs" -Recurse -Force
          Copy-Item dist\checksums-windows.txt $diagnosticsDir -Force
          Copy-Item dist\pe-inspection-windows.txt $diagnosticsDir -Force
          Copy-Item update_manifest.json $diagnosticsDir -Force
          Copy-Item update_manifest_legacy.json $diagnosticsDir -Force
          $diagnosticsPath = "dist\nfprogress-windows-$($env:APP_VERSION)-diagnostics.zip"
          Compress-Archive -Path $diagnosticsDir -DestinationPath $diagnosticsPath -CompressionLevel Optimal

      - name: Upload release to hosting over SSH
        shell: pwsh
        env:
          SSH_UPLOAD_HOST: 77.222.62.219
          SSH_UPLOAD_USER: nevskyfore
          SSH_UPLOAD_DIR: nfproject/public_html/app
          SSH_UPLOAD_PORT: 22
          SSH_UPLOAD_PRIVATE_KEY: ${{ secrets.SSH_UPLOAD_PRIVATE_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_PRIVATE_KEY)) {
            Write-Host "SSH upload skipped: SSH_UPLOAD_PRIVATE_KEY is not configured."
            exit 0
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "ssh_upload_key"
          $knownHostsPath = Join-Path $env:RUNNER_TEMP "known_hosts"
          $privateKey = $env:SSH_UPLOAD_PRIVATE_KEY -replace "\\n", "`n"
          $privateKey = ($privateKey -replace "`r`n", "`n").TrimEnd() + "`n"
          if (-not $privateKey.StartsWith("-----BEGIN ")) { throw "Invalid SSH private key format." }
          [System.IO.File]::WriteAllText($keyPath, $privateKey, [System.Text.UTF8Encoding]::new($false))
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):R" | Out-Null

          $target = "$($env:SSH_UPLOAD_USER)@$($env:SSH_UPLOAD_HOST)"
          $sshOptions = @(
            "-i", $keyPath, "-p", $env:SSH_UPLOAD_PORT,
            "-o", "UserKnownHostsFile=$knownHostsPath", "-o", "StrictHostKeyChecking=accept-new",
            "-o", "ConnectTimeout=30", "-o", "ServerAliveInterval=30"
          )
          $scpOptions = @(
            "-i", $keyPath, "-P", $env:SSH_UPLOAD_PORT,
            "-o", "UserKnownHostsFile=$knownHostsPath", "-o", "StrictHostKeyChecking=accept-new",
            "-o", "ConnectTimeout=30", "-o", "ServerAliveInterval=30"
          )
          & ssh @sshOptions $target "mkdir -p '$($env:SSH_UPLOAD_DIR)'"
          if ($LASTEXITCODE -ne 0) { throw "Unable to prepare remote release directory." }

          $artifact = "dist\nfprogress-windows-$($env:APP_VERSION).zip"
          & scp @scpOptions $artifact "${target}:$($env:SSH_UPLOAD_DIR)/"
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload Windows ZIP." }
          $installer = "dist\nfprogress-setup-$($env:APP_VERSION).exe"
          & scp @scpOptions $installer "${target}:$($env:SSH_UPLOAD_DIR)/"
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload Windows installer." }
          & scp @scpOptions update_manifest.json "${target}:$($env:SSH_UPLOAD_DIR)/update_manifest.json"
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload update_manifest.json." }
          & scp @scpOptions update_manifest_legacy.json "${target}:nfproject/public_html/update_manifest.json"
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload legacy manifest." }
          & scp @scpOptions dist\checksums-windows.txt "${target}:$($env:SSH_UPLOAD_DIR)/"
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload checksums." }
          $diagnostics = "dist\nfprogress-windows-$($env:APP_VERSION)-diagnostics.zip"
          & scp @scpOptions $diagnostics "${target}:$($env:SSH_UPLOAD_DIR)/"
          if ($LASTEXITCODE -ne 0) { throw "Unable to upload build diagnostics." }
          "WINDOWS_UPLOAD_COMPLETED=true" >> $env:GITHUB_ENV

      - name: Notify Telegram channel
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_MESSAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.telegram_message || github.event.head_commit.message }}
        run: |
          if ($env:WINDOWS_UPLOAD_COMPLETED -ne "true") {
            Write-Host "Telegram notification skipped: Windows upload was not completed."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:TELEGRAM_BOT_TOKEN) -or
              [string]::IsNullOrWhiteSpace($env:TELEGRAM_CHANNEL_ID)) {
            Write-Host "Telegram notification skipped: credentials are not configured."
            exit 0
          }
          $message = $env:TELEGRAM_MESSAGE
          if ([string]::IsNullOrWhiteSpace($message)) { $message = "Обновление $($env:APP_VERSION)" }
          Invoke-RestMethod `
            -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" `
            -Method Post `
            -Body @{ chat_id = $env:TELEGRAM_CHANNEL_ID; text = $message; disable_web_page_preview = "true" } |
            Out-Null
