name: Build Windows EXE

on:
  push:
    branches:
      - main  # Укажи свою основную ветку (например, master или main)
  workflow_dispatch:  # Сохраняем возможность ручного запуска
    inputs:
      telegram_message:
        description: 'Текст поста в Telegram. Если пусто, будет использован "Обновление <версия>".'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    # Условие: выполнять только если в коммите есть 'Обновление' ИЛИ запущено вручную
    if: contains(github.event.head_commit.message, 'Обновление') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements-build.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "nuitka[onefile]"
          pip install zstandard
          pip install PySide6
          pip install python-docx
          pip install striprtf

      - name: Cache Nuitka downloads (Dependency Walker и др.)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-cache-${{ runner.os }}

      - name: Get version from engine.py
        run: |
          $VERSION = python -c "import engine; print(engine.version)"
          echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Prepare Qt translations (ru/en only)
        run: |
          # QTranslator подгружает qt_ru.qm вместе со всеми его подкаталогами
          # (qtbase_ru.qm и т.д.) из той же папки, поэтому нужны все *_ru.qm/*_en.qm,
          # а не один произвольный файл - иначе перевод стандартных кнопок не сработает.
          $src = "${{ env.pythonLocation }}\Lib\site-packages\PySide6\translations"
          $dst = "$env:RUNNER_TEMP\translations"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Copy-Item "$src\*_ru.qm" $dst
          Copy-Item "$src\*_en.qm" $dst

      - name: Build EXE with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=attach `
            --lto=yes `
            --windows-icon-from-ico=icon.ico `
            --include-data-file=icon.ico=icon.ico `
            --include-data-dir="$env:RUNNER_TEMP/translations=PySide6/translations" `
            --output-dir=build `
            --output-filename=nfprogress.exe `
            --company-name="nfproject" `
            --product-name="nfprogress" `
            --file-version="${{ env.APP_VERSION }}" `
            --file-description="Трекер для писателей" `
            main_UI.py

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          $zipPath = "build\nfprogress-windows-$($env:APP_VERSION).zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath
          }
          Compress-Archive -Path "build\nfprogress.exe" -DestinationPath $zipPath

      - name: Upload Windows ZIP to hosting over SSH
        shell: pwsh
        env:
          SSH_UPLOAD_HOST: 77.222.62.219
          SSH_UPLOAD_USER: nevskyfore
          SSH_UPLOAD_DIR: nfproject/public_html/app
          SSH_UPLOAD_PORT: 22
          SSH_UPLOAD_PRIVATE_KEY: ${{ secrets.SSH_UPLOAD_PRIVATE_KEY }}
        run: |
          $ErrorActionPreference = "Stop"

          function Invoke-Native {
            param(
              [string]$Command,
              [Parameter(ValueFromRemainingArguments = $true)]
              [string[]]$Arguments
            )

            & $Command @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw ("Command failed with exit code {0}: {1} {2}" -f $LASTEXITCODE, $Command, ($Arguments -join " "))
            }
          }

          function Invoke-NativeWithInput {
            param(
              [string]$InputText,
              [string]$Command,
              [Parameter(ValueFromRemainingArguments = $true)]
              [string[]]$Arguments
            )

            $processInfo = [System.Diagnostics.ProcessStartInfo]::new()
            $processInfo.FileName = $Command
            $processInfo.UseShellExecute = $false
            $processInfo.RedirectStandardInput = $true
            foreach ($argument in $Arguments) {
              [void]$processInfo.ArgumentList.Add($argument)
            }

            $process = [System.Diagnostics.Process]::Start($processInfo)
            $process.StandardInput.NewLine = "`n"
            $process.StandardInput.Write($InputText)
            $process.StandardInput.Close()
            $process.WaitForExit()
            if ($process.ExitCode -ne 0) {
              throw ("Command failed with exit code {0}: {1} {2}" -f $process.ExitCode, $Command, ($Arguments -join " "))
            }
          }

          function ConvertTo-ShellSingleQuoted {
            param([string]$Value)

            return "'" + ($Value -replace "'", "'\''") + "'"
          }

          if ([string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_HOST) -or
              [string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_USER) -or
              [string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_DIR) -or
              [string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_PRIVATE_KEY)) {
            Write-Host "SSH upload skipped: set SSH_UPLOAD_HOST, SSH_UPLOAD_USER, SSH_UPLOAD_DIR and SSH_UPLOAD_PRIVATE_KEY secrets to enable it."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:SSH_UPLOAD_PORT)) {
            $env:SSH_UPLOAD_PORT = "22"
          }

          $artifact = "build\nfprogress-windows-$($env:APP_VERSION).zip"
          if (-not (Test-Path $artifact)) {
            throw "Artifact not found: $artifact"
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "ssh_upload_key"
          $knownHostsPath = Join-Path $env:RUNNER_TEMP "known_hosts"
          $privateKey = $env:SSH_UPLOAD_PRIVATE_KEY
          if ($privateKey -match "\\n") {
            $privateKey = $privateKey -replace "\\n", "`n"
          }
          $privateKey = $privateKey -replace "`r`n", "`n"
          $privateKey = $privateKey.TrimEnd() + "`n"
          if (-not $privateKey.StartsWith("-----BEGIN ")) {
            throw "SSH_UPLOAD_PRIVATE_KEY does not look like a private SSH key. It must start with -----BEGIN."
          }
          [System.IO.File]::WriteAllText(
            $keyPath,
            $privateKey,
            [System.Text.UTF8Encoding]::new($false)
          )
          icacls $keyPath /inheritance:r | Out-Null
          icacls $keyPath /grant:r "$($env:USERNAME):R" | Out-Null

          $target = "$($env:SSH_UPLOAD_USER)@$($env:SSH_UPLOAD_HOST)"
          $remoteFile = "nfprogress-windows-$($env:APP_VERSION).zip"
          $artifactSize = [math]::Round((Get-Item $artifact).Length / 1MB, 1)
          Write-Host "Uploading $remoteFile ($artifactSize MB) to $($target):$($env:SSH_UPLOAD_DIR) ..."

          $sshOptions = @(
            "-i", $keyPath,
            "-p", $env:SSH_UPLOAD_PORT,
            "-o", "UserKnownHostsFile=$knownHostsPath",
            "-o", "StrictHostKeyChecking=accept-new",
            "-o", "ConnectTimeout=30",
            "-o", "ServerAliveInterval=30"
          )
          $scpOptions = @(
            "-i", $keyPath,
            "-P", $env:SSH_UPLOAD_PORT,
            "-o", "UserKnownHostsFile=$knownHostsPath",
            "-o", "StrictHostKeyChecking=accept-new",
            "-o", "ConnectTimeout=30",
            "-o", "ServerAliveInterval=30"
          )

          Invoke-Native ssh @sshOptions $target "mkdir -p '$($env:SSH_UPLOAD_DIR)'"

          $uploadStarted = Get-Date
          Invoke-Native scp @scpOptions $artifact "${target}:$($env:SSH_UPLOAD_DIR)/$remoteFile"
          $uploadSeconds = [math]::Round(((Get-Date) - $uploadStarted).TotalSeconds, 1)
          Write-Host "Windows ZIP upload completed in $uploadSeconds seconds."

          $cleanupScript = @'
          set -eu

          upload_dir=$1
          pattern=$2
          keep=$3

          case "$keep" in
            ''|*[!0-9]*)
              keep=3
              ;;
          esac

          if [ "$keep" -lt 1 ]; then
            keep=3
          fi

          cd "$upload_dir" || exit 0

          find . -maxdepth 1 -type f -name "$pattern" |
            sed 's#^\./##' |
            sort -V |
            awk -v keep="$keep" '
              { files[NR] = $0 }
              END {
                limit = NR - keep
                for (i = 1; i <= limit; i++) {
                  print files[i]
                }
              }
            ' |
            while IFS= read -r old_file; do
              if [ -n "$old_file" ]; then
                rm -f -- "$old_file"
                printf 'Removed old release: %s\n' "$old_file"
              fi
            done
          '@
          $cleanupScript = $cleanupScript -replace "`r`n", "`n"
          $cleanupCommand = "sh -s -- $(ConvertTo-ShellSingleQuoted $env:SSH_UPLOAD_DIR) 'nfprogress-windows-*.zip' '3'"
          Invoke-NativeWithInput $cleanupScript ssh @sshOptions $target $cleanupCommand

          Invoke-Native scp @scpOptions "${target}:$($env:SSH_UPLOAD_DIR)/update_manifest.json" update_manifest.json
          Invoke-Native python scripts/update-release-manifest.py $env:APP_VERSION windows
          Invoke-Native python scripts/create-legacy-manifest.py
          Invoke-Native scp @scpOptions update_manifest.json "${target}:$($env:SSH_UPLOAD_DIR)/update_manifest.json"
          Invoke-Native scp @scpOptions update_manifest_legacy.json "${target}:nfproject/public_html/update_manifest.json"
          echo "WINDOWS_UPLOAD_COMPLETED=true" >> $env:GITHUB_ENV
          Write-Host "SSH upload completed."

      - name: Notify Telegram channel
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_MESSAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.telegram_message || github.event.head_commit.message }}
        run: |
          $ErrorActionPreference = "Stop"

          if ($env:WINDOWS_UPLOAD_COMPLETED -ne "true") {
            Write-Host "Telegram notification skipped: Windows upload was not completed."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:TELEGRAM_BOT_TOKEN) -or
              [string]::IsNullOrWhiteSpace($env:TELEGRAM_CHANNEL_ID)) {
            Write-Host "Telegram notification skipped: set TELEGRAM_BOT_TOKEN and TELEGRAM_CHANNEL_ID secrets to enable it."
            exit 0
          }

          $message = $env:TELEGRAM_MESSAGE
          if ([string]::IsNullOrWhiteSpace($message)) {
            $message = "Обновление $($env:APP_VERSION)"
          }

          $message = $message -replace "`r`n", "`n"
          Invoke-RestMethod `
            -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" `
            -Method Post `
            -Body @{
              chat_id = $env:TELEGRAM_CHANNEL_ID
              text = $message
              disable_web_page_preview = "true"
            } | Out-Null

          Write-Host "Telegram notification sent."
